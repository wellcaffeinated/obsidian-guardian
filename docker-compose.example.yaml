# Demo: watch ./example/vaults/demo and regenerate its review note on change.
#
#   docker compose -f docker-compose.example.yaml up --build
#
# Then edit any file under ./example/vaults/demo and see
# the changes file update in ./example/vaults/demo/_OG/
services:
  guardian:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Review notes are written back to the host as this user (your `id -u`/`id
      # -g`), not root. Defaults assume a single-user box; override per host:
      #   PUID=$(id -u) PGID=$(id -g) docker compose -f docker-compose.example.yaml up
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      # The vault (work-tree) — edits here are reviewed, review note written back.
      - ./example/vaults/demo:/vault
      # The git database — OUTSIDE the vault, so it never syncs. Host-visible
      # for inspection; survives restarts. The per-replica id keyed to the review
      # filename (`changes-<hash>.md`) is persisted here too, so it is stable
      # across restarts without probing the host.
      - ./example/.gitdir:/gitdir
    command: ["watch", "--poll", "--debounce", "300"]
    init: true
